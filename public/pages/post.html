<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The streets — Article</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #0a0a0a;
      --white: #fafafa;
      --gray-1: #1c1c1c;
      --gray-2: #3a3a3a;
      --gray-3: #6b6b6b;
      --gray-4: #a8a8a8;
      --gray-5: #d4d4d4;
      --gray-6: #ebebeb;
      --gray-7: #f4f4f4;
      --rule: 1px solid var(--black);
      --rule-lt: 1px solid var(--gray-5);
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      cursor: crosshair;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    ::-webkit-scrollbar {
      width: 3px;
    }
    ::-webkit-scrollbar-track {
      background: var(--white);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--black);
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--black);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 2.5rem;
      height: 56px;
      border-bottom: var(--rule);
    }

    .nav-left {
      display: flex;
      gap: 0.25rem;
    }

    .nav-center {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--white);
      text-align: center;
    }

    .nav-right {
      display: flex;
      justify-content: flex-end;
    }

    .nav-link {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray-4);
      padding: 0.5rem 0.9rem;
      border-radius: 2px;
      transition: color 0.15s;
    }

    .nav-link:hover {
      color: var(--white);
    }

    .nav-write {
      background: var(--white);
      color: var(--black);
      border: none;
      cursor: crosshair;
      font-family: 'Barlow', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.45rem 1.1rem;
      border-radius: 2px;
      transition: background 0.15s, color 0.15s;
    }

    .nav-write:hover {
      background: var(--gray-5);
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 999;
      background: var(--black);
      color: var(--white);
      padding: 1rem 1.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-left: 3px solid var(--white);
      transform: translateX(200%);
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s;
    }

    .toast.show {
      transform: translateX(0);
      opacity: 1;
    }

    .post-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray-3);
      margin-bottom: 3rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.15s;
    }

    .back-btn:hover {
      color: var(--black);
    }

    .post-kicker {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray-3);
      display: block;
      margin-bottom: 1rem;
    }

    .post-h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }

    .post-byline {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 1rem 0;
      border-top: var(--rule);
      border-bottom: var(--rule);
      margin-bottom: 3rem;
      font-size: 0.78rem;
      flex-wrap: wrap;
    }

    .byline-name {
      font-weight: 600;
    }

    .post-cover {
      width: 100%;
      aspect-ratio: 16/7;
      background: var(--black);
      margin-bottom: 2.5rem;
      overflow: hidden;
    }

    .post-cover-pattern {
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, var(--gray-1) 39px, var(--gray-1) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, var(--gray-1) 39px, var(--gray-1) 40px);
      background-color: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .post-cover-label {
      font-family: 'Libre Baskerville', serif;
      font-size: clamp(1rem, 3vw, 2rem);
      font-weight: 700;
      font-style: italic;
      color: rgba(255, 255, 255, 0.15);
      text-align: center;
      padding: 1rem;
    }

    .post-body {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--gray-1);
    }

    .post-body p {
      margin-bottom: 1.5rem;
    }

    .post-body h2 {
      font-size: 1.35rem;
      font-weight: 700;
      margin: 2.5rem 0 0.75rem;
    }

    .post-body blockquote {
      border-left: 3px solid var(--black);
      margin: 2rem 0;
      padding: 0.25rem 0 0.25rem 1.75rem;
      font-style: italic;
    }

    .post-actions {
      display: flex;
      gap: 0;
      border-top: var(--rule);
      border-bottom: var(--rule);
      margin-top: 3rem;
      flex-wrap: wrap;
    }

    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-3);
      padding: 0.9rem 1.5rem;
      border-right: var(--rule-lt);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .action-btn:hover {
      background: var(--gray-7);
      color: var(--black);
    }

    .action-btn.liked {
      color: var(--black);
      font-weight: 700;
    }

    .comments {
      margin-top: 3rem;
    }

    .comments-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 2rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--black);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .comments-title span {
      font-size: 0.75rem;
      color: var(--gray-3);
    }

    .comment {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.75rem;
      padding-bottom: 1.75rem;
      border-bottom: var(--rule-lt);
    }

    .comment-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--black);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .comment-body {
      flex: 1;
    }

    .comment-head {
      display: flex;
      gap: 0.75rem;
      align-items: baseline;
      margin-bottom: 0.4rem;
    }

    .comment-name {
      font-size: 0.8rem;
      font-weight: 700;
    }

    .comment-time {
      font-size: 0.72rem;
      color: var(--gray-4);
    }

    .comment-text {
      font-size: 0.875rem;
      color: var(--gray-2);
      line-height: 1.65;
    }

    .comment-input-row {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .comment-textarea {
      flex: 1;
      border: var(--rule);
      padding: 0.75rem 1rem;
      font-family: 'Barlow', sans-serif;
      font-size: 0.875rem;
      resize: none;
      height: 80px;
      outline: none;
      background: var(--white);
    }

    .comment-textarea:focus {
      background: var(--gray-7);
    }

    .comment-post-btn {
      background: var(--black);
      color: var(--white);
      border: none;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0 1.5rem;
      height: 44px;
      align-self: flex-end;
    }

    .empty {
      max-width: 760px;
      margin: 4rem auto;
      text-align: center;
      padding: 3rem;
    }
    .empty h3 {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 768px) {
      nav { grid-template-columns: 1fr auto; padding: 0 1rem; }
      .nav-left { display: none; }
      .post-wrap { padding: 2rem 1.25rem 4rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="../index.html" class="nav-link">Feed</a>
    <a href="../index.html?view=all" class="nav-link">All Posts</a>
  </div>
  <div class="nav-center">The streets</div>
    <div>
    <a href="create.html" class="nav-write">+ write</a>
  </div>
</nav>

<div class="toast" id="toast"></div>

<main id="post-container"></main>

<script>
  function loadPosts() {
    const stored = localStorage.getItem('broadsheet_posts');
    if(stored) {
      try { return JSON.parse(stored); } catch(e) { return []; }
    }
    return [];
  }

  function savePosts(posts) {
    localStorage.setItem('broadsheet_posts', JSON.stringify(posts));
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function renderPost() {
    const urlParams = new URLSearchParams(window.location.search);
    const params = Object.fromEntries(urlParams.entries());
    const IdtoFind = params.id;
    const posts = loadPosts();
    const post = posts.find(p => p._id === params.id);
    
    const container = document.getElementById('post-container');
    
    if (!post) {
      container.innerHTML = `<div class="empty"><h3>Post not found</h3><p>The article you're looking for doesn't exist or has been removed.</p><a href="../index.html" style="text-decoration:underline; cursor: pointer;">← Back to Feed</a></div>`;
      return;
    }
    
    const bodyHtml = post.content.split('\n').map(line => {
      if (line.startsWith('## ')) return `<h2>${escapeHtml(line.slice(3))}</h2>`;
      if (line.startsWith('> ')) return `<blockquote>${escapeHtml(line.slice(2))}</blockquote>`;
      if (!line.trim()) return '';
      return `<p>${escapeHtml(line)}</p>`;
    }).join('');
    
    const sampleComments = post.comments

    container.innerHTML = `
      <div class="post-wrap">
        <button class="back-btn" onclick="window.location.href='../index.html'">← Back to Feed</button>
        <span class="post-kicker">${escapeHtml(post.category)}</span>
        <h1 class="post-h1">${escapeHtml(post.title)}</h1>
        <div class="post-byline">
          <span class="byline-name">${escapeHtml(post.author)}</span>
          <span class="byline-sep">·</span>
          <span class="byline-date">${post.date}</span>
          <span class="byline-sep">·</span>
          <span class="byline-read">${post.readTime} read</span>
        </div>
        <div class="post-cover">
          <div class="post-cover-pattern">
            <span class="post-cover-label">${escapeHtml(post.title)}</span>
          </div>
        </div>
        <div class="post-body">${bodyHtml}</div>
        <div class="post-actions">
          <button class="action-btn" id="post-comment-btn">
            💬 ${post.comments.length} Comments
          </button>
          <button class="action-btn" id="share-btn">
            Share →
          </button>
        </div>
        <div class="comments" id="comments-section">
          <div class="comments-title">Discussion <span>${post.comments.length} comments</span></div>
          ${sampleComments.map(c => `
            <div class="comment">
              <div class="comment-body">
                <div class="comment-head">
                  <span class="comment-name">${c.CommenterEmail}</span>
                  <span class="comment-time">${c.date}</span>
                </div>
                <div class="comment-text">${escapeHtml(c.CommentContent)}</div>
              </div>
            </div>
          `).join('')}
          <div class="comment-input-row">
            <input class="comment-textarea" id="new-comment-email" placeholder="EmailAddress"></input>
            <textarea class="comment-textarea" id="new-comment" placeholder="Add to the discussion..."></textarea>
            <button class="comment-post-btn" id="post-comment-submit">Post</button>
          </div>
        </div>
      </div>
    `;
        
    document.getElementById('post-comment-submit').addEventListener('click', () => {
      const textarea = document.getElementById('new-comment');
      const commentText = textarea.value.trim();
      if (!commentText) return toast('Comment cannot be empty.');
      
      const emailInput = document.getElementById('new-comment-email');
      const emailText = emailInput.value.trim();
      if (!emailText) return toast('Email cannot be empty.');
      fetch('/comment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          PostId: IdtoFind,
          CommenterEmail: emailText,
          CommentContent: commentText
        })
      }).then(res => res.json())
      .then(data => {
        if (data.error) {
          toast('Failed to post comment.');
        } else 
        {
          const commentsDiv = document.getElementById('comments-section');
          const newComment = document.createElement('div');
          newComment.className = 'comment';
          newComment.innerHTML = `
            <div class="comment-body">
              <div class="comment-head">
                <span class="comment-name">${emailText}</span>
                <span class="comment-time">${new Date().toLocaleTimeString()}</span>
              </div>
            <div class="comment-text">${escapeHtml(commentText)}</div>
            </div>`;
          const inputRow = document.querySelector('.comment-input-row');
          commentsDiv.insertBefore(newComment, inputRow);
          toast('Comment posted successfully.');

        }
      })
      
      post.comments.length++;
      savePosts(posts);
      const commentBtn = document.getElementById('post-comment-btn');
      if (commentBtn) commentBtn.innerHTML = `💬 ${post.comments.length} Comments`;
      const titleSpan = document.querySelector('.comments-title span');
      if (titleSpan) titleSpan.textContent = `${post.comments.length} comments`;
      
      textarea.value = '';
      toast('Comment added');
    });
    
    document.getElementById('share-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(window.location.href);
      toast('Link copied to clipboard');
    });
  }
  
  renderPost();
</script>
</body>
</html>
