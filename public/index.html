<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Streets Knows — Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #0a0a0a;
      --white: #fafafa;
      --gray-1: #1c1c1c;
      --gray-2: #3a3a3a;
      --gray-3: #6b6b6b;
      --gray-4: #a8a8a8;
      --gray-5: #d4d4d4;
      --gray-6: #ebebeb;
      --gray-7: #f4f4f4;
      --rule: 1px solid var(--black);
      --rule-lt: 1px solid var(--gray-5);
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    ::-webkit-scrollbar {
      width: 3px;
    }
    ::-webkit-scrollbar-track {
      background: var(--white);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--black);
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--black);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 2.5rem;
      height: 56px;
      border-bottom: var(--rule);
    }

    .nav-left {
      display: flex;
      gap: 0.25rem;
    }

    .nav-center {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--white);
      text-align: center;
    }

    .nav-right {
      display: flex;
      justify-content: flex-end;
    }

    .nav-link {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray-4);
      padding: 0.5rem 0.9rem;
      border-radius: 2px;
      transition: color 0.15s;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--white);
    }

    .nav-write {
      background: var(--white);
      color: var(--black);
      border: none;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.45rem 1.1rem;
      border-radius: 2px;
      transition: background 0.15s, color 0.15s;
    }

    .nav-write:hover {
      background: var(--gray-5);
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 999;
      background: var(--black);
      color: var(--white);
      padding: 1rem 1.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-left: 3px solid var(--white);
      transform: translateX(200%);
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s;
    }

    .toast.show {
      transform: translateX(0);
      opacity: 1;
    }

    .masthead {
      border-bottom: 3px double var(--black);
      padding: 3rem 2.5rem 2rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
    }

    .masthead-left {
      flex: 1;
    }

    .masthead-eyebrow {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray-3);
      margin-bottom: 0.6rem;
      display: block;
    }

    .masthead-title {
      font-family: 'Libre Baskerville', serif;
      font-size: clamp(2.8rem, 6vw, 5.5rem);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.03em;
    }

    .masthead-title em {
      font-style: italic;
      font-weight: 400;
    }

    .masthead-date {
      font-size: 0.7rem;
      color: var(--gray-3);
      letter-spacing: 0.06em;
      line-height: 1.8;
      text-align: right;
    }

    .filter-strip {
      display: flex;
      align-items: center;
      gap: 0;
      border-bottom: var(--rule);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-strip::-webkit-scrollbar { display: none; }

    .f-tag {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray-3);
      padding: 0.8rem 1.3rem;
      border-right: var(--rule-lt);
      white-space: nowrap;
      transition: all 0.15s;
      position: relative;
    }

    .f-tag::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--black);
      transform: scaleX(0);
      transition: transform 0.2s;
    }

    .f-tag:hover { color: var(--black); }
    .f-tag.active { color: var(--black); }
    .f-tag.active::after { transform: scaleX(1); }

    .search-wrap {
      margin-left: auto;
      padding: 0.4rem 1.25rem;
      border-left: var(--rule-lt);
    }

    #search-input {
      background: none;
      border: none;
      outline: none;
      font-family: 'Barlow', sans-serif;
      font-size: 0.8rem;
      color: var(--black);
      letter-spacing: 0.04em;
      width: 180px;
    }

    .feed-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      border-left: var(--rule);
    }

    .card {
      border-right: var(--rule);
      border-bottom: var(--rule);
      padding: 1.75rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .card:hover { background: var(--gray-7); }

    .card--featured { grid-column: span 8; }
    .card--sm { grid-column: span 4; }
    .card--third { grid-column: span 4; }
    .card--featured .card-title { font-size: clamp(1.6rem, 3vw, 2.4rem); line-height: 1.1; }

    .card-kicker {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gray-3);
      margin-bottom: 0.75rem;
      display: block;
    }

    .card-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.02em;
      margin-bottom: 0.65rem;
    }

    .card-excerpt {
      font-size: 0.85rem;
      color: var(--gray-2);
      line-height: 1.65;
      margin-bottom: 1.25rem;
      font-weight: 300;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      border-top: var(--rule-lt);
      padding-top: 0.85rem;
      flex-wrap: wrap;
    }

    .card-author {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .card-stats {
      margin-left: auto;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .stat {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: 0.7rem;
      color: var(--gray-3);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.15s;
    }
    .stat:hover { color: var(--black); }
    .stat.liked { color: var(--black); font-weight: 600; }

    .list-header {
      padding: 2.5rem 2.5rem 1.5rem;
      border-bottom: 3px double var(--black);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .list-header h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .list-count { font-size: 0.75rem; color: var(--gray-3); }

    .list-table {
      width: 100%;
      border-collapse: collapse;
    }
    .list-table thead tr { border-bottom: 2px solid var(--black); }
    .list-table th {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gray-3);
      padding: 0.75rem 1.25rem;
      text-align: left;
    }
    .list-table tbody tr {
      border-bottom: var(--rule-lt);
      cursor: pointer;
      transition: background 0.12s;
    }
    .list-table tbody tr:hover { background: var(--gray-7); }
    .list-table td {
      padding: 1rem 1.25rem;
      font-size: 0.875rem;
      color: var(--gray-2);
      vertical-align: middle;
    }
    .list-table td:first-child {
      font-family: 'Libre Baskerville', serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--black);
    }
    .list-badge {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border: 1px solid var(--black);
      border-radius: 1px;
    }
    .table-wrap { padding: 0 1rem; }

    .empty {
      grid-column: 1/-1;
      padding: 5rem 2rem;
      text-align: center;
    }
    .empty h3 {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    @media (max-width: 768px) {
      nav { grid-template-columns: 1fr auto; padding: 0 1rem; }
      .nav-left { display: none; }
      .masthead { flex-direction: column; padding: 2rem 1.25rem; }
      .masthead-date { text-align: left; }
      .feed-grid { border-left: none; }
      .card--featured, .card--sm, .card--third { grid-column: span 12; }
      .card { border-left: var(--rule); border-right: var(--rule); }
      .table-wrap { padding: 0; overflow-x: auto; }
      .list-table th, .list-table td { padding: 0.75rem 0.75rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-link active" id="nav-feed">Feed</a>
    <a href="index.html?view=all" class="nav-link" id="nav-all">All Posts</a>
  </div>
  <div class="nav-center">The Streets</div>
  <div class="nav-right">
    <a href="./pages/create.html" class="nav-write" style="background:var(--gray-5);">+ Write</a>
  </div>
</nav>

<div class="toast" id="toast"></div>

<main id="app-root"></main>

<script>
  let posts = [];

    fetch('/allpost')
      .then((response) => {
        if (!response.ok) {
          return response.text().then((text) => Promise.reject(new Error(text || `HTTP ${response.status}`)));
        }
        return response.json();
      })
      .then((data) => {
        if (data.error) {
          throw new Error(data.error);
        }
        posts = data;
        toast('All posts retrieved.');
        persistPosts();
        renderWithMode();
      })
      .catch((error) => {
        console.error('Fetch /allpost failed:', error);
        toast('Error retrieving posts. Please try again.');
      });

  let activeFilter = 'all';
  let activeSearch = '';

  function persistPosts() { localStorage.setItem('broadsheet_posts', JSON.stringify(posts)); }
  function loadPersisted() { const stored = localStorage.getItem('broadsheet_posts'); if(stored) { try { posts = JSON.parse(stored); } catch(e) {} } }
  loadPersisted();

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
  }

  function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

  function filteredPosts() {
    return posts.filter(p => {
      const catMatch = activeFilter === 'all' || p.category === activeFilter;
      const searchMatch = !activeSearch || p.title.toLowerCase().includes(activeSearch.toLowerCase()) || p.description.toLowerCase().includes(activeSearch.toLowerCase()) || p.author.toLowerCase().includes(activeSearch.toLowerCase());
      return catMatch && searchMatch;
    });
  }

  function loadAPost(id) {
    const p = posts.find(x => x._id === id);
    if(p) {
      window.location.href = `./pages/post.html?id=${id}`;
      fetch(`/${id}`).then((response) => {
        response.json().then((data) => {
          if(data.error){
            toast('Error loading post. Please try again.');
          }else{
            toast('Post loaded successfully.');
          }
        })
      }).catch((error) => {
        toast('Network error. Please try again.');
      });

    } else {
      toast('Post not found.');
    }
  }

  function renderGridFeed() {
    const list = filteredPosts();
    const root = document.getElementById('app-root');
    if(!list.length) {
      root.innerHTML = `<div class="empty"><h3>No posts found</h3><p>Try adjusting your filter or search.</p></div>`;
      return;
    }
    const [first, ...rest] = list;
    let html = `
      <div class="masthead">
        <div class="masthead-left"><h1 class="masthead-title">Ideas.<br><em>Unfiltered.</em></h1></div>
        <div class="masthead-right"><div class="masthead-date" id="masthead-date"></div></div>
      </div>
      <div class="filter-strip">
        ${['all','tech','design','culture','lifestyle','travel'].map(t => `<button class="f-tag ${activeFilter===t?'active':''}" data-cat="${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
        <div class="search-wrap"><input id="search-input" type="text" placeholder="Search posts..." autocomplete="off"></div>
      </div>
      <div class="feed-grid" id="feed-grid"></div>
    `;
    root.innerHTML = html;
    const feedGrid = document.getElementById('feed-grid');
    let inner = cardHTML(first, true);
    const pair = rest.slice(0,2);
    pair.forEach(p => inner += cardHTML(p, false, p.featured));
    const remaining = rest.slice(2);
    remaining.forEach(p => inner += cardHTML(p, false, false, p.featured));
    feedGrid.innerHTML = inner;
    document.querySelectorAll('.f-tag').forEach(btn => {
      btn.addEventListener('click', (e) => { activeFilter = btn.getAttribute('data-cat'); renderWithMode(); });
    });
    document.getElementById('search-input')?.addEventListener('input', (e) => { activeSearch = e.target.value; renderWithMode(); });
    document.getElementById('masthead-date').innerHTML = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) + '<br>Vol. 1, Issue 1';
    attachCardEvents();
  }

  function cardHTML(p, featured, sm=false) {
    const cls = featured ? 'card card--featured' : sm ? 'card card--sm' : 'card card--third';
    return `<div class="${cls}" data-id="${p._id}">
      <div class="card-divider"></div><span class="card-kicker">${p.category}</span>
      <h2 class="card-title">${escapeHtml(p.title)}</h2>
      <p class="card-excerpt">${escapeHtml(p.description)}</p>
      <div class="card-meta">
        <span class="card-author">${escapeHtml(p.author)}</span><span class="card-dot">&middot;</span><span class="card-date">${p.date}</span><span class="card-dot">&middot;</span><span class="card-read">${p.readTime}</span>
        <div class="card-stats">
          <button class="stat comment-stat" data-id="${p._id}">💬 ${p.comments.length}</button>
        </div>
      </div>
    </div>`;
  }

  function renderAllPostsTable() {
    const root = document.getElementById('app-root');
    root.innerHTML = `<div class="list-header"><h1>All Posts</h1><span class="list-count" id="list-count"></span></div><div class="table-wrap"><table class="list-table"><thead><tr><th>Title</th><th>Author</th><th>Category</th><th>Date</th><th>Read</th></tr></thead><tbody id="list-body"></tbody></table></div>`;
    document.getElementById('list-count').textContent = posts.length + ' posts total';
    const tbody = document.getElementById('list-body');
    tbody.innerHTML = posts.map(p => `<tr data-id="${p._id}"><td>${escapeHtml(p.title)}</td><td>${escapeHtml(p.author)}</td><td><span class="list-badge">${p.category}</span></td><td>${p.date}</td><td>${p.readTime}</td></tr>`).join('');
    document.querySelectorAll('#list-body tr').forEach(tr => {
      tr.addEventListener('click', () => { loadAPost(tr.getAttribute('data-id')); });
    });
  }

  function attachCardEvents() {
    document.querySelectorAll('.like-stat').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); likeHandler(btn.getAttribute('data-id'), btn); });
    });
    document.querySelectorAll('.card, .comment-stat').forEach(el => {
      el.addEventListener('click', (e) => { if(e.target.closest('.like-stat')) return; const id = el.closest('[data-id]')?.getAttribute('data-id'); if(id) loadAPost(id); });
    });
  }

  function renderWithMode() {
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('view') === 'all') {
      document.getElementById('nav-feed')?.classList.remove('active');
      document.getElementById('nav-all')?.classList.add('active');
      renderAllPostsTable();
    } else {
      document.getElementById('nav-feed')?.classList.add('active');
      document.getElementById('nav-all')?.classList.remove('active');
      renderGridFeed();
    }
  }

  renderWithMode();
</script>
</body>
</html>
